<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Варіант 7 - Events</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
</head>
<body>
    <header>
        <h1>Сервіс реєстрації на факультатив/подію</h1>
    </header>
    
    <main class="container">
        <section class="form-section">
            <h2 id="formTitle">Додати подію</h2>
            <form id="createForm">
                <input type="hidden" id="editIdInput" value="" />

                <div class="field">
                    <label for="titleInput">Назва події</label>
                    <input id="titleInput" type="text" placeholder="Напр., Семінар з кібербезпеки" />
                    <p class="error-text" id="titleError"></p>
                </div>

                <div class="field">
                    <label for="dateInput">Дата</label>
                    <input id="dateInput" type="date" />
                    <p class="error-text" id="dateError"></p>
                </div>

                <div class="field">
                    <label for="locationInput">Локація</label>
                    <input id="locationInput" type="text" placeholder="Напр., Аудиторія 204" />
                    <p class="error-text" id="locationError"></p>
                </div>

                <div class="field">
                    <label for="capacityInput">Кількість місць</label>
                    <input id="capacityInput" type="number" min="1" placeholder="Введіть число" />
                    <p class="error-text" id="capacityError"></p>
                </div>

                <div class="field">
                    <label for="descInput">Опис</label>
                    <textarea id="descInput" rows="3" placeholder="Короткий опис події..."></textarea>
                    <p class="error-text" id="descError"></p>
                </div>
                
                <div class="buttons">
                    <button type="submit" id="submitBtn">Додати</button>
                    <button type="button" id="resetBtn">Очистити</button>
                </div>
            </form>
        </section>

        <section class="table-section">
            <h2>Список подій</h2>
            
            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="Пошук за назвою..." />
                <select id="sortSelect">
                    <option value="default">Сортування: За замовчуванням</option>
                    <option value="dateAsc">За датою (спочатку старіші)</option>
                    <option value="dateDesc">За датою (спочатку новіші)</option>
                </select>
            </div>

            <table id="eventsTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Назва</th>
                        <th>Дата</th>
                        <th>Локація</th>
                        <th>Місця</th>
                        <th>Опис</th>
                        <th>Дії</th>
                    </tr>
                </thead>
                <tbody id="eventsTableBody">
                    </tbody>
            </table>
        </section>
    </main>
</body>
</html>
